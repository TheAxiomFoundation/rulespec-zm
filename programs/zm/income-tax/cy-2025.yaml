# Zambia individual income tax -- 2025 charge year (calendar year)
#
# Composes the flagship gross-to-tax calculation (rulespec-zm#1): the
# Act 22 of 2023 Charging Schedule paragraph 2(1) rates applied to the
# employee's income (the CY2025 statutory base is gross - Act 22 of
# 2024 s.4 makes the approved-fund deduction employer-only and no
# NHIMA deductibility provision exists), with the employee NAPSA and
# NHIMA contributions and the composed disposable-income identity for
# the single-employee surface. Turnover tax, VAT, excise and the
# Social Cash Transfer are separate program surfaces.

program: zm/income-tax
period: '2025-01'

outputs:
  - pilot_worker_income_tax
  - pilot_worker_disposable_income

scope:
  zm:
    - zm/statutes/composed/pilot-worker-disposable-income-pipeline
    - zm/statutes/act-2023-22/income-tax-amendment-2023
    - zm/regulations/si-2024-9/pensionable-earnings-amendment-2024
    - zm/regulations/si-2019-63/national-health-insurance-general-regulations-2019
