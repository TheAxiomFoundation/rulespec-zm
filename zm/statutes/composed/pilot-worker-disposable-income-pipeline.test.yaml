  input:
    zm:statutes/act-2023-22/income-tax-amendment-2023#input.individual_income: 0
    zm:statutes/composed/pilot-worker-disposable-income-pipeline#input.benefits_received: 0
    zm:statutes/composed/pilot-worker-disposable-income-pipeline#input.napsa_employee_contribution: 0
    zm:statutes/composed/pilot-worker-disposable-income-pipeline#input.nhima_employee_contribution: 0
  output:
