name: Signed apply (Path R)

# Keep this file at .github/workflows/signed-apply.yml: the production signer
# binds to that caller workflow ref. The called jobs retain environment:
# signing, which enforces the caller repository's environment protections.
on:
  workflow_dispatch:
    inputs:
      citations:
        description: "Citation paths to re-encode (comma- or newline-separated)."
        required: true
        type: string
      limit:
        description: "Max citations this run."
        required: false
        type: string
        default: "12"

permissions:
  # Allows open_pr to classify a missing matrix artifact. The called encode
  # job narrows its own token back to contents: read only.
  actions: read
  contents: read

jobs:
  signed_apply:
    uses: TheAxiomFoundation/axiom-encode/.github/workflows/signed-apply-reusable.yml@main
    with:
      citations: ${{ inputs.citations }}
      limit: ${{ inputs.limit }}
    # Reusable-workflow call jobs cannot declare an environment, so these are
    # org secrets explicitly restricted to the country repositories.
    secrets:
      openai-api-key: ${{ secrets.OPENAI_API_KEY }}
      apply-signing-key: ${{ secrets.AXIOM_ENCODE_APPLY_SIGNING_KEY }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
