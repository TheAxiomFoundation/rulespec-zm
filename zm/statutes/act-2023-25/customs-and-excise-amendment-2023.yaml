format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: zm/statute/act-2023-25/customs-and-excise-amendment-2023
    source_sha256: 79e604fe0f95da4de21519d25a05ebfa0b8fb301b9ad3826d1205b90fa73a6cf
  summary: |-
    “This Act shall come into operation on 1st January, 2024.” Appendix II substitutes “60%” for “125%” opposite subheading 2207.20.90, substitutes “K400” for “K361” opposite heading 24.01, inserts coke and semi-coke at 5%, and substitutes 25% for 30% opposite specified Chapter 87 subheadings. Appendices I and III amend customs-duty and surtax rates.
  deferred_outputs:
    - output: zm:statutes/act-2023-25/customs-and-excise-amendment-2023#remission_of_unrecovered_duty_fine_or_interest
      reason: The remission output depends on definitions and operative provisions of the principal Customs and Excise Act that are not supplied as RuleSpec context.
      source_values:
        - zm:statutes/act-2023-25/customs-and-excise-amendment-2023#inactive_tax_account_period
        - zm:statutes/act-2023-25/customs-and-excise-amendment-2023#outstanding_tax_debt_period
        - zm:statutes/act-2023-25/customs-and-excise-amendment-2023#small_tax_debt_limit
    - output: zm:statutes/act-2023-25/customs-and-excise-amendment-2023#licence_renewal_compliance
      reason: Section 55 of the principal Act is unavailable, so the amendment's complete licence-renewal consequence cannot be reconstructed.
      source_values:
        - zm:statutes/act-2023-25/customs-and-excise-amendment-2023#licence_renewal_minimum_lead_time
