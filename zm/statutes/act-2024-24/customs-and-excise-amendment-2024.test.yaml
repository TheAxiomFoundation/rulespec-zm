# Companion fixtures for the CY2025 excise rows (rulespec-zm#1
# instrument 8). Hand arithmetic per commodity; the cigarette input is
# in milles (thousands of sticks) matching the statutory per-mille
# duty. Petrol/diesel figures are the combined excise + fuel-levy
# amounts carried by Second Schedule heading 9.

- name: cy2025_opaque_beer
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#input.opaque_beer_litres: 100
  output:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#opaque_beer_duty: 25

- name: cy2025_wine
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#input.wine_taxable_value: 1000
  output:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#wine_duty: 600

