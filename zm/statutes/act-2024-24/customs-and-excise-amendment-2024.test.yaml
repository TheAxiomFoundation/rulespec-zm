- name: cy2025_cigarettes
  # 2 milles (2,000 sticks) x K452/mille = 904.
  period:
    period_kind: tax_year
    start: '2025-01-01'
    end: '2025-12-31'
  input:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#input.cigarette_milles: 2
  output:
    zm:statutes/act-2024-24/customs-and-excise-amendment-2024#cigarette_duty: 904

