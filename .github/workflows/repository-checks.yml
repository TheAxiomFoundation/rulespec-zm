name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    uses: TheAxiomFoundation/.github/.github/workflows/validate-rulespec.yml@947c68b8102c5b696ceb16faff5c1c365217da8d
    secrets: inherit
    with:
      axiom-encode-ref: 6cc3f8a59539e5abacbf351b913db98877cf6579
      axiom-rules-engine-ref: de0efdc73b469132ee268e1c832e8f7148b91431
      axiom-corpus-ref: e2a1cdcc8d2d1a4eae08ca371849bcfed4274823
      rulespec-us-ref: 0f291b367bf7e15555f9973112278c5cbf221653
      validate-roots: auto
      run-generated-guard: false
      # Composed-pilot programs/ guarding, as piloted in rulespec-uk and
      # adopted by rulespec-gh (encode#1053).
      guard-programs-root: true
