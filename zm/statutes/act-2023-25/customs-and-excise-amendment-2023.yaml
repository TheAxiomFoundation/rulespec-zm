format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: zm/statute/act-2023-25/customs-and-excise-amendment-2023
    source_sha256: 79e604fe0f95da4de21519d25a05ebfa0b8fb301b9ad3826d1205b90fa73a6cf
  summary: 'Section 3 inserts section 22(3): “a pilot in charge of an aircraft shall
    before, or immediately after, departure of the aircraft deliver, electronically
    to the customs service division, a cargo manifest.” Section 9 inserts section
    69(2): “a monetary deposit or security guarantee shall be required where the goods
    removed from a warehouse are for purposes of export in bond.”'
