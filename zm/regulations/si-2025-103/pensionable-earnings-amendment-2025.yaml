              excerpt: "These Regulations shall come into operationon on 1st January, 2026."
    versions:
      - effective_from: '2026-01-01'
        formula: |-
          if monthly_pensionable_earnings <= 0: 0 else: min(
            max(
              employee_contribution_rate * min(monthly_pensionable_earnings, monthly_social_security_ceiling),
              minimum_total_monthly_contribution / 2
            ),
            maximum_monthly_employee_contribution
          )

