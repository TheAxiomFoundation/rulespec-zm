format: rulespec/v1
module:
  proof_validation:
    required: true
  source_verification:
    corpus_citation_path: zm/regulation/si-2025-103/pensionable-earnings-amendment-2025
    source_sha256: 8b9307b88247b939d58a24b86c202b0b72d297c0be97b9d774886310ca9f07ce
  summary: |-
    “These Regulations shall come into operation on 1st January, 2026.”
    The substituted schedules specify national average monthly earnings of K9,309.00, a social security ceiling of K37,236.00, minimum total monthly contributions of K1.50, and maximum total monthly contributions of K3,723.60 for 1st January through 31st December 2026. The contribution-table notes state that the employee’s and employer’s shares shall each be calculated as five percent of the employee’s total pensionable earnings without first rounding earnings or contribution amounts to the nearest Kwacha.
  deferred_outputs:
    - output: zm:regulations/si-2025-103/pensionable-earnings-amendment-2025#name_indexed_scheme_amounts
      reason: The First Schedule National Average Monthly Earnings figure is the scheme's standing reference statistic; the values it indexes (for example the Cap. 256 section 19 minimum-pension percentages) are computed in the principal-Act modules, not by this SI's contribution formulas, so no numeric output of this module consumes it directly.
      source_values:
        - zm:regulations/si-2025-103/pensionable-earnings-amendment-2025#national_average_monthly_earnings
