  - name: individual_income_tax
    kind: derived
    entity: Person
    dtype: Money
    unit: ZMW
    period: Year
    source: Income Tax (Amendment) Act, 2023, section 11(a)
    metadata:
      proof:
        atoms:
          - path: versions[0].formula
            kind: formula
            source:
              corpus_citation_path: zm/statute/act-2023-22/income-tax-amendment-2023
              excerpt: "on the balance of so much of an individual’s income as exceeds"
    versions:
      - effective_from: '2024-01-01'
        formula: |-
          individual_income_twenty_percent_rate * max(0, min(individual_income, individual_income_twenty_percent_band_upper_threshold) - individual_income_twenty_percent_band_lower_threshold)
          + individual_income_thirty_percent_rate * max(0, min(individual_income, individual_income_thirty_percent_band_upper_threshold) - individual_income_thirty_percent_band_lower_threshold)
          + individual_income_thirty_seven_percent_rate * max(0, individual_income - individual_income_thirty_seven_percent_band_lower_threshold)
